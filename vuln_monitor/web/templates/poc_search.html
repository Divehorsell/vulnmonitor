{% extends "base.html" %}

{% block title %}PoCжђњзґў{% endblock %}
{% block page_title %}PoCжђњзґў{% endblock %}

{% block content %}
<div class="space-y-6">
    <p class="text-sm text-surface-500">жђњзґўGitHubдёЉзљ„жјЏжґћPoCе’ЊEXPд»Јз Ѓ</p>

    <div class="bg-white rounded-xl shadow-sm border border-surface-200 p-6">
        <form id="poc-search-form" class="space-y-4">
            <div class="flex items-center space-x-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-surface-700 mb-1">жђњзґўе…ій”®иЇЌ</label>
                    <input
                        type="text"
                        id="poc-query"
                        name="query"
                        placeholder="иѕ“е…ҐCVEзј–еЏ·пј€е¦‚ CVE-2026-1340пј‰ж€–е…ій”®иЇЌ..."
                        class="w-full px-4 py-2.5 border border-surface-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors"
                    />
                </div>
                <div class="pt-6">
                    <button
                        type="button"
                        onclick="searchPoC()"
                        class="inline-flex items-center px-6 py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors"
                    >
                        <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        жђњзґў
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div id="poc-results" class="space-y-4">
        <div class="bg-white rounded-xl shadow-sm border border-surface-200 p-12 text-center">
            <svg class="mx-auto h-12 w-12 text-surface-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <p class="mt-2 text-sm text-surface-400">иѕ“е…ҐCVEзј–еЏ·ж€–е…ій”®иЇЌжђњзґўPoC/EXP</p>
        </div>
    </div>
</div>

<script>
function searchPoC() {
    const query = document.getElementById('poc-query').value.trim();
    if (!query) return;

    const resultsDiv = document.getElementById('poc-results');
    resultsDiv.innerHTML = '<div class="flex items-center justify-center py-12"><svg class="animate-spin h-8 w-8 text-brand-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="ml-3 text-surface-500">жђњзґўдё­...</span></div>';

    fetch('/api/v1/poc-search?q=' + encodeURIComponent(query))
        .then(r => r.json())
        .then(data => {
            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = '<div class="bg-white rounded-xl shadow-sm border border-surface-200 p-12 text-center"><svg class="mx-auto h-12 w-12 text-surface-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><p class="mt-2 text-sm text-surface-400">жњЄж‰ѕе€°з›ёе…іPoC/EXP</p></div>';
                return;
            }

            let html = '<div class="grid grid-cols-1 gap-4">';
            data.results.forEach(r => {
                html += '<div class="bg-white rounded-xl shadow-sm border border-surface-200 p-5 hover:shadow-md transition-shadow">';
                html += '<div class="flex items-start justify-between">';
                html += '<div class="flex-1 min-w-0">';
                html += '<a href="' + r.url + '" target="_blank" class="text-brand-600 hover:text-brand-700 font-medium text-sm">' + r.repo_name + '</a>';
                html += '<p class="mt-1 text-sm text-surface-500 truncate">' + (r.description || 'ж— жЏЏиї°') + '</p>';
                html += '</div>';
                html += '<div class="flex items-center space-x-3 ml-4 flex-shrink-0">';
                if (r.stars !== undefined) {
                    html += '<span class="inline-flex items-center text-xs text-surface-500"><svg class="w-3.5 h-3.5 mr-1 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>' + r.stars + '</span>';
                }
                if (r.language) {
                    html += '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-700">' + r.language + '</span>';
                }
                html += '</div></div>';
                html += '<div class="mt-3 flex items-center text-xs text-surface-400">';
                html += '<span>ж›ґж–°: ' + (r.updated_at || 'N/A') + '</span>';
                html += '</div></div>';
            });
            html += '</div>';
            resultsDiv.innerHTML = html;
        })
        .catch(err => {
            resultsDiv.innerHTML = '<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">жђњзґўе¤±иґҐ: ' + err.message + '</div>';
        });
}

document.getElementById('poc-query').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); searchPoC(); }
});
</script>
{% endblock %}
